runtime: nodejs20
env: standard
instance_class: F2

handlers:
  - url: /.*
    script: auto
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 2

# No colocar secretos aquí.
# Configurar variables sensibles mediante Secret Manager / entorno de despliegue.
env_variables:
  NODE_ENV: "production"
  DOCUMENT_AI_VALIDATION_ENABLED: "true"
  DOCUMENT_AI_VALIDATION_REQUIRED: "true"
  DOCUMENT_AI_VALIDATION_MODE: "strict"
