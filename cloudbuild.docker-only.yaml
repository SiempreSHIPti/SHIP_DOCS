# Alternativa mínima: sólo construye imagen.
# Útil si el trigger ya hace deploy por separado.
steps:
  - id: "Build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/registro-documental:$COMMIT_SHA"
      - "."

images:
  - "gcr.io/$PROJECT_ID/registro-documental:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
